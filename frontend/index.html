<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lily — 口语陪练 Agent</title>
  <link rel="stylesheet" href="style.css">
  <!-- Chart.js (雷达图) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- 顶部栏 -->
    <header class="header">
      <h1>🌸 Lily <span class="subtitle">口语陪练 Agent</span></h1>
      <div class="header-controls">
        <label for="scenario">场景：</label>
        <select id="scenario">
          <option value="restaurant">🍽️ 餐厅点餐</option>
          <option value="travel">✈️ 旅行问路</option>
          <option value="interview">💼 面试求职</option>
        </select>
        <button id="reset-btn" class="reset-btn" title="重置会话">🔄</button>
      </div>
    </header>

    <!-- 主体区域：左对话 + 右反馈 -->
    <main class="main-content">
      <!-- 对话区域 -->
      <section class="chat-section">
        <div id="messages" class="messages">
          <div class="message lily">
            <div class="avatar">🌸</div>
            <div class="bubble">
              Hi! I'm Lily. Let's practice English together! 🎤 Press and hold the button to talk.
            </div>
          </div>
        </div>
      </section>

      <!-- 反馈面板 -->
      <aside class="feedback-section">
        <div class="feedback-header">
          <h2>📊 评估反馈</h2>
        </div>
        <div id="feedback-content" class="feedback-content">
          <div class="feedback-placeholder">
            🎤 按住下方按钮说话<br><br>
            说完后这里会显示<br>评分雷达图和纠错建议
          </div>
        </div>
      </aside>
    </main>

    <!-- 状态栏 -->
    <div class="status-bar">
      <span id="status-text">就绪</span>
      <span class="status-info">
        难度: <span id="difficulty-label" class="badge badge-medium">medium</span>
        | 连错: <span id="streak-label">0</span>
        | 轮次: <span id="turns-label">0</span>
      </span>
    </div>

    <!-- 录音按钮 -->
    <footer class="footer">
      <div id="waveform" class="waveform hidden">
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
      </div>
      <button id="record-btn" class="record-btn">
        <span class="mic-icon">🎤</span>
        <span class="btn-text">按住说话</span>
      </button>
    </footer>
  </div>

  <script src="feedback.js"></script>
  <script src="app.js"></script>
</body>
</html>
